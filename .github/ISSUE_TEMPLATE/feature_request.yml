name: Feature request
description: Suggest a new capability or enhancement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What does the current API force you to write?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Sketch the API or behaviour change you have in mind.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
